{% extends "base.html" %}
{% block title %}Login – Lumière Beauty{% endblock %}
{% block content %}

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">💋</div>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Sign in to your Lumière account</p>

    <form action="{{ url_for('login') }}" method="POST" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Enter your password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a></p>
  </div>
</div>

{% endblock %}
